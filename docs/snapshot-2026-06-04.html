<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP-TT KPI Snapshot (real data)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0f1d; --surface:#131b2e; --surface-2:#1a2438; --border:#2a3654; --border-soft:#1f2940;
    --text:#e2e8f0; --text-dim:#94a3b8; --text-mute:#64748b;
    --brand:#60a5fa; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --purple:#a78bfa; --teal:#2dd4bf;
    --good-bg:rgba(34,197,94,.15); --warn-bg:rgba(245,158,11,.15);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:13px;padding:20px 24px 48px}
  .mono{font-family:'JetBrains Mono',monospace}
  h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.4px}
  h1 .accent{color:var(--brand)}
  .sub{color:var(--text-dim);font-size:12px;margin-top:4px}
  .sub .pill{background:var(--good-bg);color:#86efac;border:1px solid rgba(34,197,94,.35);padding:2px 8px;border-radius:999px;font-weight:600;margin-left:8px}
  .grid{display:grid;gap:12px;margin-top:16px}
  .kpis{grid-template-columns:repeat(6,1fr)}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:.6rem;padding:12px 14px;min-height:108px;display:flex;flex-direction:column;gap:6px;position:relative}
  .kpi.primary{border-left:3px solid var(--warn)}
  .kpi .label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px}
  .kpi .vrow{display:flex;align-items:baseline;gap:5px;margin-top:auto}
  .kpi .val{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
  .kpi .unit{font-size:11px;color:var(--text-mute);font-weight:500}
  .kpi .n{font-size:10px;color:var(--text-mute);font-family:'JetBrains Mono',monospace}
  .cards{grid-template-columns:7fr 5fr}
  @media(max-width:1100px){.cards{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:.6rem;overflow:hidden}
  .card h3{font-size:12px;font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border-soft);background:var(--surface-2);display:flex;justify-content:space-between}
  .card h3 .hint{color:var(--text-mute);font-weight:500;font-size:10px}
  .card .body{padding:12px 14px}
  .chart{position:relative;height:240px}
  .chart.sm{height:200px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th,td{text-align:right;padding:5px 8px;border-bottom:1px solid var(--border-soft)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--text-mute);font-weight:600;font-size:10px;text-transform:uppercase}
  td.mono{font-family:'JetBrains Mono',monospace;color:var(--text)}
  .foot{margin-top:18px;color:var(--text-mute);font-size:10px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
  <h1>WP<span class="accent">·TT</span> KPI Snapshot</h1>
  <div class="sub">실제 프로덕션 추출 데이터 · as-of <span id="asof" class="mono"></span><span class="pill">LIVE EXTRACT</span></div>

  <div class="grid kpis" id="kpiStrip"></div>

  <div class="grid cards" style="margin-top:12px">
    <div class="card">
      <h3>시간대별 크레인 대기시간 (초) <span class="hint">avg · p95, 24h</span></h3>
      <div class="body"><div class="chart"><canvas id="craneqChart"></canvas></div></div>
    </div>
    <div class="card">
      <h3>작업유형별 사이클 타임 중앙값 (분) <span class="hint">median</span></h3>
      <div class="body"><div class="chart"><canvas id="cycleChart"></canvas></div></div>
    </div>
  </div>

  <div class="grid cards" style="margin-top:12px">
    <div class="card">
      <h3>작업유형×시프트 공차 이동비율 (%) <span class="hint">상위</span></h3>
      <div class="body"><div class="chart sm"><canvas id="emptyChart"></canvas></div></div>
    </div>
    <div class="card">
      <h3>QC별 시간당 처리량 <span class="hint">상위 QC</span></h3>
      <div class="body">
        <table id="mphTable"><thead><tr><th>QC</th><th>MPH</th><th>Moves</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <div class="foot" id="foot"></div>

<script>
const DATA = {"as_of" : "2026-06-04", "headline" : {"K_UTIL" : 97.5, "K_EMPTY" : 1.350, "K_EMPTY_R" : 48.4, "K_CYCLE" : 2674, "K_CRANE_Q" : 625, "K_MPH" : 25.2}, "sample_n" : {"K_UTIL" : 50, "K_EMPTY" : 21788, "K_CYCLE" : 50906, "K_CRANE_Q" : 119980, "K_MPH" : 9}, "crane_q_hour" : [{"hour" : 0, "avg" : 556.70, "p95" : 1409.00}, {"hour" : 1, "avg" : 611.80, "p95" : 1366.00}, {"hour" : 2, "avg" : 667.90, "p95" : 1527.00}, {"hour" : 3, "avg" : 798.60, "p95" : 1589.60}, {"hour" : 4, "avg" : 693.90, "p95" : 1554.00}, {"hour" : 5, "avg" : 682.20, "p95" : 1614.00}, {"hour" : 6, "avg" : 577.50, "p95" : 1388.00}, {"hour" : 7, "avg" : 601.00, "p95" : 1453.00}, {"hour" : 8, "avg" : 674.20, "p95" : 1493.00}, {"hour" : 9, "avg" : 896.10, "p95" : 1672.00}, {"hour" : 10, "avg" : 852.80, "p95" : 1641.00}, {"hour" : 11, "avg" : 741.20, "p95" : 1400.00}, {"hour" : 12, "avg" : 736.50, "p95" : 1610.00}, {"hour" : 13, "avg" : 597.30, "p95" : 1268.60}, {"hour" : 14, "avg" : 621.60, "p95" : 1458.00}, {"hour" : 15, "avg" : 542.40, "p95" : 1299.00}, {"hour" : 16, "avg" : 472.20, "p95" : 1217.00}, {"hour" : 17, "avg" : 531.50, "p95" : 1364.00}, {"hour" : 18, "avg" : 594.30, "p95" : 1478.00}, {"hour" : 19, "avg" : 552.00, "p95" : 1337.00}, {"hour" : 20, "avg" : 588.60, "p95" : 1423.00}, {"hour" : 21, "avg" : 556.70, "p95" : 1506.40}, {"hour" : 22, "avg" : 593.50, "p95" : 1418.00}, {"hour" : 23, "avg" : 558.70, "p95" : 1513.00}], "cycle" : [{"jobtype" : "DS", "med" : 2993.00, "p95" : 8448.60, "jobs" : 14209}, {"jobtype" : "LD", "med" : 3661.00, "p95" : 7112.80, "jobs" : 10139}, {"jobtype" : "AH", "med" : 125.00, "p95" : 465.60, "jobs" : 8670}, {"jobtype" : "RH", "med" : 2000.00, "p95" : 14585.80, "jobs" : 4686}, {"jobtype" : "GO", "med" : 1886.00, "p95" : 5470.20, "jobs" : 4659}, {"jobtype" : "GI", "med" : 1198.50, "p95" : 3368.00, "jobs" : 4596}, {"jobtype" : "MO", "med" : 3168.00, "p95" : 14950.50, "jobs" : 2060}, {"jobtype" : "MI", "med" : 1099.00, "p95" : 3623.00, "jobs" : 1861}, {"jobtype" : "GC", "med" : 1360.00, "p95" : 3624.60, "jobs" : 17}, {"jobtype" : "LC", "med" : 807.00, "p95" : 2607.80, "jobs" : 9}], "empty" : [{"jobtype" : "MO", "shift" : "Night", "ratio" : 56.6}, {"jobtype" : "LD", "shift" : "Evening", "ratio" : 51.5}, {"jobtype" : "LD", "shift" : "Night", "ratio" : 50.6}, {"jobtype" : "DS", "shift" : "Day", "ratio" : 49.9}, {"jobtype" : "DS", "shift" : "Evening", "ratio" : 49.0}, {"jobtype" : "MO", "shift" : "Day", "ratio" : 48.2}, {"jobtype" : "LD", "shift" : "Day", "ratio" : 46.8}, {"jobtype" : "MO", "shift" : "Evening", "ratio" : 44.9}, {"jobtype" : "DS", "shift" : "Night", "ratio" : 42.8}], "util_crane" : [{"type" : "YC", "pct" : 29.9, "n" : 32}, {"type" : "QC", "pct" : 71.8, "n" : 28}], "mph_qc" : [{"qc" : "C48", "mph" : 26.25, "moves" : 630}, {"qc" : "C51", "mph" : 26.61, "moves" : 612}, {"qc" : "C52", "mph" : 25.38, "moves" : 609}, {"qc" : "C49", "mph" : 24.71, "moves" : 593}, {"qc" : "C47", "mph" : 24.91, "moves" : 573}, {"qc" : "C50", "mph" : 23.42, "moves" : 562}, {"qc" : "C15", "mph" : 20.55, "moves" : 452}, {"qc" : "C42", "mph" : 31.21, "moves" : 437}, {"qc" : "C43", "mph" : 27.79, "moves" : 389}, {"qc" : "C41", "mph" : 27.71, "moves" : 388}, {"qc" : "C18", "mph" : 32.17, "moves" : 386}, {"qc" : "C33", "mph" : 31.92, "moves" : 383}, {"qc" : "C16", "mph" : 18.85, "moves" : 377}, {"qc" : "C32", "mph" : 31.08, "moves" : 373}, {"qc" : "C14", "mph" : 18.60, "moves" : 372}, {"qc" : "C34", "mph" : 30.42, "moves" : 365}, {"qc" : "C24", "mph" : 35.60, "moves" : 356}, {"qc" : "C53", "mph" : 27.00, "moves" : 351}, {"qc" : "C45", "mph" : 25.00, "moves" : 350}, {"qc" : "C44", "mph" : 24.00, "moves" : 336}, {"qc" : "C23", "mph" : 28.30, "moves" : 283}, {"qc" : "C39", "mph" : 23.33, "moves" : 280}, {"qc" : "C38", "mph" : 25.18, "moves" : 277}, {"qc" : "C40", "mph" : 19.43, "moves" : 272}, {"qc" : "C22", "mph" : 24.27, "moves" : 267}, {"qc" : "C46", "mph" : 20.08, "moves" : 261}, {"qc" : "C17", "mph" : 21.17, "moves" : 254}, {"qc" : "C37", "mph" : 21.00, "moves" : 231}, {"qc" : "C38", "mph" : 37.00, "moves" : 222}, {"qc" : "C53", "mph" : 23.78, "moves" : 214}]};

// Internal K_ ids are never shown — only these display names appear in the UI.
const META = {
  K_EMPTY:   {name:'공차 이동거리/작업', unit:'km/Job', primary:true},
  K_EMPTY_R: {name:'공차 이동 비율',     unit:'%'},
  K_CRANE_Q: {name:'크레인 대기시간',    unit:'s'},
  K_MPH:     {name:'QC 시간당 처리량',   unit:'move/hr'},
  K_CYCLE:   {name:'TT 사이클 타임',     unit:'s'},
  K_UTIL:    {name:'TT 가동률',          unit:'%'},
};
const ORDER = ['K_EMPTY','K_EMPTY_R','K_CRANE_Q','K_MPH','K_CYCLE','K_UTIL'];

document.getElementById('asof').textContent = DATA.as_of;

// KPI strip
const strip = document.getElementById('kpiStrip');
for(const k of ORDER){
  const m = META[k], v = DATA.headline[k], n = DATA.sample_n[k];
  const el = document.createElement('div');
  el.className = 'kpi' + (m.primary ? ' primary':'');
  el.innerHTML = `<div class="label">${m.name}</div>
    <div class="vrow"><span class="val">${v ?? '—'}</span><span class="unit">${m.unit}</span></div>
    <div class="n">N ${n!=null ? Number(n).toLocaleString() : '—'}</div>`;
  strip.appendChild(el);
}

Chart.defaults.font.family = 'Inter'; Chart.defaults.font.size = 10;
Chart.defaults.color = '#94a3b8'; Chart.defaults.borderColor = '#1f2940';
const noLegend = {plugins:{legend:{display:false}}};

// K_CRANE_Q by hour
new Chart(craneqChart, {type:'line',
  data:{labels:DATA.crane_q_hour.map(r=>r.hour+'h'),
    datasets:[
      {label:'avg', data:DATA.crane_q_hour.map(r=>r.avg), borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,.12)', fill:true, tension:.3, pointRadius:0, borderWidth:2},
      {label:'p95', data:DATA.crane_q_hour.map(r=>r.p95), borderColor:'#f59e0b', borderDash:[4,3], fill:false, tension:.3, pointRadius:0, borderWidth:1.5},
    ]},
  options:{maintainAspectRatio:false,plugins:{legend:{display:true,labels:{boxWidth:10}}},scales:{y:{beginAtZero:true}}}});

// K_CYCLE median minutes by jobtype
new Chart(cycleChart, {type:'bar',
  data:{labels:DATA.cycle.map(r=>r.jobtype),
    datasets:[{data:DATA.cycle.map(r=>+(r.med/60).toFixed(1)), backgroundColor:'#a78bfa'}]},
  options:{maintainAspectRatio:false,...noLegend,scales:{y:{beginAtZero:true,title:{display:true,text:'min'}}}}});

// K_EMPTY_R by jobtype×shift (top)
const emp = DATA.empty.slice(0,8);
new Chart(emptyChart, {type:'bar',
  data:{labels:emp.map(r=>r.jobtype+'·'+r.shift),
    datasets:[{data:emp.map(r=>r.ratio), backgroundColor:emp.map(r=>r.ratio>=53?'#ef4444':r.ratio>=48?'#f59e0b':'#22c55e')}]},
  options:{maintainAspectRatio:false,...noLegend,indexAxis:'y',scales:{x:{beginAtZero:true,title:{display:true,text:'% empty'}}}}});

// K_MPH per QC table
const tb = document.querySelector('#mphTable tbody');
for(const r of DATA.mph_qc.slice(0,12)){
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${r.qc}</td><td class="mono">${r.mph}</td><td class="mono">${Number(r.moves).toLocaleString()}</td>`;
  tb.appendChild(tr);
}

const uc = DATA.util_crane.map(u=>`${u.type} ${u.pct}% (${u.n})`).join('  ·  ');
document.getElementById('foot').textContent =
  `크레인 가동률: ${uc}   |   실제 프로덕션 추출 데이터 (PostgreSQL)`;
</script>
</body>
</html>
